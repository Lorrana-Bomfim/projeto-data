<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversão de Data</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Conversor de Data</h2>

    <input type="text" id="data" placeholder="Ex: 2022-11-30">
    <button onclick="converter()">Converter</button>

    <div id="resultado"></div>
  </div>

  <script>
    function converter() {
      const data = document.getElementById("data").value;

      const regex = /(\d{4})-(\d{2})-(\d{2})/;

      if (regex.test(data)) {
        const novaData = data.replace(regex, "$3/$2/$1");
        document.getElementById("resultado").innerHTML = "Data convertida: " + novaData;
      } else {
        document.getElementById("resultado").innerHTML = "Formato inválido";
      }
    }
  </script>

</body>
</html>
